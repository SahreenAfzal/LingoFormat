<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LingoFormat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 420px;
      background: #111827;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    input {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0b1220;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      border: none;
      color: white;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #38bdf8;
      min-height: 18px;
    }

    .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h2>📧 LingoFormat</h2>

    <div class="hint">
      Upload EN HTML email + translation DOCX
    </div>

    <!-- HTML FILE -->
    <input type="file" id="htmlFile" accept=".html" />

    <!-- DOCX FILE -->
    <input type="file" id="docxFile" accept=".docx" />

    <!-- BUTTON -->
    <button id="generateBtn">Generate Localized Emails</button>

    <!-- STATUS -->
    <div id="status"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
